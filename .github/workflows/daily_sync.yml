name: Daily Rate Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for pushing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install SDK
        run: pip install google-genai

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_rate.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "InfohyperBot"
          
          # Force git to see the data folder
          git add data/rubux-rate.json data/error.txt || true
          
          # Check if there are actually changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected in rates. Skipping commit."
          else
            git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
