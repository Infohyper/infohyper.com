name: Daily Rate Automation

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch: # Allows you to click a button to run it now

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Gemini Library
        run: pip install google-generativeai

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_rate.py

      - name: Save to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "InfohyperBot"
          git add data/rubux-rate.json
          git commit -m "Auto-update Robux rates: $(date +'%Y-%m-%d')" || exit 0
          git push
