name: Daily Rate Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install New Gemini SDK
        # Note the change: it's now google-genai
        run: pip install google-genai

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_rate.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "InfohyperBot"
          git add data/rubux-rate.json data/error.txt || echo "No files"
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
